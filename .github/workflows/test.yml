name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write wrangler.toml for tests
        run: echo "$WRANGLER_TOML" > wrangler.toml
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
      - run: npm test
