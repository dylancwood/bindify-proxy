name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write wrangler.toml for tests
        run: echo "$WRANGLER_TOML" > wrangler.toml
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
      - run: npm test

  migrate-db:
    name: Migrate Database
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write wrangler.toml
        run: echo "$WRANGLER_TOML" > wrangler.toml
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
      - run: npx wrangler d1 migrations apply bindify-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    name: Deploy Worker
    needs: [test, migrate-db]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write wrangler.toml
        run: echo "$WRANGLER_TOML" > wrangler.toml
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
      - name: Set short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - run: npx wrangler deploy --define "BUILD_VERSION:'\"${{ env.SHORT_SHA }}\"'"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
